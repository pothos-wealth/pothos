services:
    backend:
        build:
            context: ./backend
            target: production
        restart: unless-stopped
        env_file: .env
        environment:
            NODE_ENV: production
            PORT: 3001
            DATABASE_URL: /app/data/pothos.db
        volumes:
            - sqlite_data:/app/data
        networks:
            - internal
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/api/v1/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

    frontend:
        build:
            context: ./frontend
            target: production
        restart: unless-stopped
        env_file: .env
        environment:
            NODE_ENV: production
            PORT: 3000
        networks:
            - internal
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./certbot/conf:/etc/letsencrypt:ro
            - ./certbot/www:/var/www/certbot:ro
        depends_on:
            backend:
                condition: service_healthy
            frontend:
                condition: service_healthy
        networks:
            - internal
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 10s

    certbot:
        image: certbot/certbot
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
    sqlite_data:

networks:
    internal:
        driver: bridge
